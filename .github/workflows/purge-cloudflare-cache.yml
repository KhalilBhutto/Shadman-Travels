name: Purge Cloudflare Cache

# Runs automatically right after GitHub's own "pages build and
# deployment" workflow finishes successfully. This means: every time
# the live site updates, Cloudflare's cache gets cleared right after,
# so visitors (and you) always see the newest version.
on:
  push:
    branches: [main]

jobs:
  purge-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for GitHub Pages to finish deploying
        run: sleep 60

      - name: Purge Cloudflare cache
        run: |
          curl -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
