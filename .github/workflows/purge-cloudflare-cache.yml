name: Purge Cloudflare Cache

# Runs automatically right after GitHub's own "pages build and
# deployment" workflow finishes successfully. This means: every time
# the live site updates, Cloudflare's cache gets cleared right after,
# so visitors (and you) always see the newest version.
on:
  workflow_run:
    workflows: ["pages build and deployment"]
    types:
      - completed

jobs:
  purge-cache:
    runs-on: ubuntu-latest
    # Only run if the deploy actually succeeded — no point purging
    # cache after a failed deploy.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Purge Cloudflare cache
        run: |
          curl -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
